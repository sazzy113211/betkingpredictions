<!-- REGISTER PAGE (register.html) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetKing Pro - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: white;
        }
        
        .font-cyber {
            font-family: 'Orbitron', sans-serif;
        }
        
        .glass-panel {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .neon-border {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            border: 1px solid #00ff88;
        }
        
        .input-field {
            background: rgba(31, 41, 55, 0.8);
            border: 1px solid #374151;
            transition: all 0.3s;
        }
        
        .input-field:focus {
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
            outline: none;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            color: #000;
            font-weight: 700;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }
        
        .bg-pattern {
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
        }
    </style>
</head>
<body class="min-h-screen bg-pattern flex items-center justify-center p-4">
    <div class="glass-panel p-8 rounded-2xl neon-border w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="font-cyber text-3xl font-black mb-2">
                Create <span class="text-green-400">Account</span>
            </h1>
            <p class="text-gray-400 text-sm">Join BetKing Pro today</p>
        </div>

        <form id="registerForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="text" id="username" required 
                        class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-white placeholder-gray-500"
                        placeholder="Choose a username">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="email" id="email" required 
                        class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-white placeholder-gray-500"
                        placeholder="Enter your email">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Phone Number</label>
                <div class="relative">
                    <i class="fas fa-phone absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="tel" id="phone" required 
                        class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-white placeholder-gray-500"
                        placeholder="e.g. +234 or +233">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="password" id="password" required minlength="6"
                        class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-white placeholder-gray-500"
                        placeholder="Create password (min 6 chars)">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Confirm Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="password" id="confirmPassword" required 
                        class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-white placeholder-gray-500"
                        placeholder="Confirm your password">
                </div>
            </div>

            <div class="flex items-start text-sm text-gray-400">
                <input type="checkbox" required class="mt-1 mr-2 accent-green-500">
                <span>I agree to the <a href="#" class="text-green-400 hover:underline">Terms of Service</a> and <a href="#" class="text-green-400 hover:underline">Privacy Policy</a></span>
            </div>

            <button type="submit" class="btn-primary w-full py-4 rounded-xl text-lg">
                Create Account
            </button>

            <div class="text-center text-gray-400 text-sm">
                Already have an account? 
                <a href="index.html" class="text-green-400 hover:underline font-semibold">Login here</a>
            </div>
        </form>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('currentUser')) {
            window.location.href = 'free-games.html';
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showToast('Passwords do not match!', 'error');
                return;
            }
            
            let users = JSON.parse(localStorage.getItem('users')) || [
                { id: 1, username: "admin", email: "admin@betking.com", password: "admin123", role: "admin", vip: false, vipExpiry: null }
            ];
            
            if (users.find(u => u.email === email)) {
                showToast('Email already registered!', 'error');
                return;
            }
            
            const newUser = {
                id: users.length + 1,
                username,
                email,
                phone,
                password,
                role: 'user',
                vip: false,
                vipExpiry: null
            };
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            
            showToast('Account created successfully! Redirecting...');
            setTimeout(() => {
                window.location.href = 'free-games.html';
            }, 1500);
        });

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 px-6 py-4 rounded-xl shadow-2xl z-50 transform transition-all duration-300 ${type === 'error' ? 'bg-red-500' : 'bg-green-500'} text-white font-semibold`;
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-2"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
