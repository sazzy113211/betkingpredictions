<!-- LOGIN PAGE (index.html) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetKing Pro - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: white;
        }
        
        .font-cyber {
            font-family: 'Orbitron', sans-serif;
        }
        
        .glass-panel {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .neon-border {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            border: 1px solid #00ff88;
        }
        
        .gold-gradient {
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
        }
        
        .input-field {
            background: rgba(31, 41, 55, 0.8);
            border: 1px solid #374151;
            transition: all 0.3s;
        }
        
        .input-field:focus {
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
            outline: none;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            color: #000;
            font-weight: 700;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }
        
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .bg-pattern {
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
        }
    </style>
</head>
<body class="min-h-screen bg-pattern flex items-center justify-center p-4">
    <div class="w-full max-w-6xl grid md:grid-cols-2 gap-8 items-center">
        
        <!-- Left Side - Branding -->
        <div class="hidden md:block text-center floating">
            <div class="mb-8">
                <i class="fas fa-crown text-6xl text-yellow-400 mb-4"></i>
                <h1 class="font-cyber text-5xl font-black mb-4">
                    BET<span class="text-green-400">KING</span>
                </h1>
                <p class="text-xl text-gray-400">Premium Sports Predictions</p>
            </div>
            
            <div class="grid grid-cols-3 gap-4 mt-12">
                <div class="glass-panel p-4 rounded-xl">
                    <div class="text-2xl font-bold text-green-400">94%</div>
                    <div class="text-sm text-gray-400">Win Rate</div>
                </div>
                <div class="glass-panel p-4 rounded-xl">
                    <div class="text-2xl font-bold text-blue-400">Daily</div>
                    <div class="text-sm text-gray-400">Free Tips</div>
                </div>
                <div class="glass-panel p-4 rounded-xl">
                    <div class="text-2xl font-bold text-purple-400">VIP</div>
                    <div class="text-sm text-gray-400">Access</div>
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="glass-panel p-8 rounded-2xl neon-border w-full max-w-md mx-auto">
            <div class="text-center mb-8">
                <div class="md:hidden mb-4">
                    <h1 class="font-cyber text-3xl font-black">
                        BET<span class="text-green-400">KING</span>
                    </h1>
                </div>
                <h2 class="text-2xl font-bold mb-2">Welcome Back</h2>
                <p class="text-gray-400 text-sm">Login to access your account</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-3.5 text-gray-500"></i>
                        <input type="email" id="email" required 
                            class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-white placeholder-gray-500"
                            placeholder="Enter your email">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-3.5 text-gray-500"></i>
                        <input type="password" id="password" required 
                            class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-white placeholder-gray-500"
                            placeholder="Enter your password">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-3.5 text-gray-500 hover:text-white">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-gray-400 cursor-pointer">
                        <input type="checkbox" class="mr-2 accent-green-500"> Remember me
                    </label>
                    <a href="#" class="text-green-400 hover:underline">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary w-full py-4 rounded-xl text-lg">
                    Login to Account
                </button>

                <div class="text-center text-gray-400 text-sm">
                    Don't have an account? 
                    <a href="register.html" class="text-green-400 hover:underline font-semibold">Register now</a>
                </div>

                <!-- Admin Access -->
                <div class="pt-4 border-t border-gray-700 text-center">
                    <button type="button" onclick="adminLogin()" class="text-xs text-gray-600 hover:text-gray-400">
                        Admin Access
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('currentUser')) {
            window.location.href = 'free-games.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Get users from localStorage
            let users = JSON.parse(localStorage.getItem('users')) || [
                { id: 1, username: "admin", email: "admin@betking.com", password: "admin123", role: "admin", vip: false, vipExpiry: null },
                { id: 2, username: "testuser", email: "user@example.com", password: "user123", role: "user", vip: false, vipExpiry: null }
            ];
            
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                showToast('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'free-games.html';
                }, 1000);
            } else {
                showToast('Invalid email or password', 'error');
            }
        });

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function adminLogin() {
            document.getElementById('email').value = 'admin@betking.com';
            document.getElementById('password').value = 'admin123';
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 px-6 py-4 rounded-xl shadow-2xl z-50 transform transition-all duration-300 ${type === 'error' ? 'bg-red-500' : 'bg-green-500'} text-white font-semibold`;
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-2"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
